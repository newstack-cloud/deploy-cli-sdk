sonar.projectKey=newstack-cloud_deploy-cli-sdk
sonar.organization=newstack-cloud

sonar.projectName=NewStack Deploy CLI SDK
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=**/*_test.go,internal/*.go,testutils/*.go

sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.txt

sonar.go.tests.reportPaths=report.json

sonar.go.govet.reportPaths=govet-report.out

sonar.go.golint.reportPaths=staticcheck.out

sonar.sourceEncoding=UTF-8

# Suppress duplicate string literal warnings in test files.
# Test fixtures intentionally repeat values for readability and self-containment.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

# Suppress single-method interface naming convention in all files.
# These are exported SDK interfaces where renaming would be a breaking API change.
sonar.issue.ignore.multicriteria.e2.ruleKey=godre:S8196
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.go