name: Renovate

# Self-hosted Renovate runner.
# Renovate owns version updates across the repo; Dependabot is kept for security
# updates only.

on:
  schedule:
    # Hourly so the internal-cascade rule (which bypasses the weekly schedule)
    # can react to upstream lib releases promptly.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
      dryRun:
        description: "Dry run (full|null)"
        required: false
        default: "null"

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v41.0.0
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: "required"
          RENOVATE_DRY_RUN: ${{ inputs.dryRun || 'null' }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
